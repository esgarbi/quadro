<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 13px; font-weight: 500; }
      .ts  { font-size: 11px; font-weight: 400; fill: #5F5E5A; }

      .n-gray   { fill: #F1EFE8; stroke: #888780; }
      .t-gray   { fill: #2C2C2A; }
      .n-teal   { fill: #E1F5EE; stroke: #0F6E56; }
      .t-teal   { fill: #085041; }
      .n-green  { fill: #EAF3DE; stroke: #3B6D11; }
      .t-green  { fill: #27500A; }
      .n-amber  { fill: #FAEEDA; stroke: #854F0B; }
      .t-amber  { fill: #633806; }
      .n-red    { fill: #FCEBEB; stroke: #A32D2D; }
      .t-red    { fill: #791F1F; }
      .n-note   { fill: #F1EFE8; stroke: #B4B2A9; }
      .t-note   { fill: #5F5E5A; }

      @media (prefers-color-scheme: dark) {
        .ts     { fill: #888780; }
        .n-gray  { fill: #444441; stroke: #888780; }
        .t-gray  { fill: #D3D1C7; }
        .n-teal  { fill: #085041; stroke: #5DCAA5; }
        .t-teal  { fill: #9FE1CB; }
        .n-green { fill: #27500A; stroke: #97C459; }
        .t-green { fill: #C0DD97; }
        .n-amber { fill: #633806; stroke: #EF9F27; }
        .t-amber { fill: #FAC775; }
        .n-red   { fill: #791F1F; stroke: #F09595; }
        .t-red   { fill: #F7C1C1; }
        .n-note  { fill: #2C2C2A; stroke: #444441; }
        .t-note  { fill: #888780; }
      }
    </style>
  </defs>

  <!-- UNASSIGNED -->
  <rect x="20" y="80" width="116" height="40" rx="6" stroke-width="0.5" class="n-gray"/>
  <text class="th t-gray" x="78" y="100" text-anchor="middle" dominant-baseline="central">Unassigned</text>

  <!-- IN_PROGRESS -->
  <rect x="172" y="80" width="112" height="40" rx="6" stroke-width="0.5" class="n-teal"/>
  <text class="th t-teal" x="228" y="100" text-anchor="middle" dominant-baseline="central">In progress</text>

  <!-- PENDING_REVIEW -->
  <rect x="320" y="80" width="130" height="40" rx="6" stroke-width="0.5" class="n-teal"/>
  <text class="th t-teal" x="385" y="100" text-anchor="middle" dominant-baseline="central">Pending review</text>

  <!-- APPROVED -->
  <rect x="490" y="80" width="100" height="40" rx="6" stroke-width="0.5" class="n-green"/>
  <text class="th t-green" x="540" y="100" text-anchor="middle" dominant-baseline="central">Approved</text>

  <!-- COMPLETE -->
  <rect x="490" y="200" width="100" height="40" rx="6" stroke-width="0.5" class="n-green"/>
  <text class="th t-green" x="540" y="220" text-anchor="middle" dominant-baseline="central">Complete</text>

  <!-- STALE -->
  <rect x="20" y="200" width="116" height="40" rx="6" stroke-width="0.5" class="n-red"/>
  <text class="th t-red" x="78" y="220" text-anchor="middle" dominant-baseline="central">Stale</text>

  <!-- REVISION_NEEDED -->
  <rect x="160" y="200" width="140" height="40" rx="6" stroke-width="0.5" class="n-amber"/>
  <text class="th t-amber" x="230" y="220" text-anchor="middle" dominant-baseline="central">Revision needed</text>

  <!-- Happy path arrows -->
  <line x1="136" y1="100" x2="170" y2="100" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <line x1="284" y1="100" x2="318" y2="100" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <line x1="450" y1="100" x2="488" y2="100" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <line x1="540" y1="120" x2="540" y2="198" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <!-- Reviewer arc -->
  <path d="M385 80 L385 58 L228 58 L228 78" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="304" y="50" text-anchor="middle">reviewer assigned</text>

  <!-- IN_PROGRESS → REVISION_NEEDED -->
  <line x1="228" y1="120" x2="228" y2="198" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- REVISION_NEEDED → IN_PROGRESS -->
  <path d="M300 218 L318 218 L318 148 L286 148" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="344" y="188" text-anchor="start">↻ resubmit</text>

  <!-- IN_PROGRESS → STALE -->
  <path d="M172 118 L152 118 L152 168 L78 168 L78 198" fill="none" stroke="#E24B4A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- STALE → UNASSIGNED -->
  <line x1="78" y1="200" x2="78" y2="122" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="22" y="164" text-anchor="start">ombudsman</text>

  <!-- Global exits footer -->
  <rect x="20" y="278" width="640" height="30" rx="6" stroke-width="0.5" class="n-note"/>
  <text class="ts t-note" x="340" y="293" text-anchor="middle" dominant-baseline="central">Any state → Human review · Any state → On hold (global exits, enforced by Board)</text>
</svg>
